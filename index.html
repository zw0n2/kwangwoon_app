<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light only" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="도서관 출입증" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <title>도서관 출입증</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <link rel="icon" href="./icon.png" />
    <link rel="stylesheet" href="./style.css?v=11" />
  </head>
  <body>
    <main class="app-shell" aria-label="모바일 도서관 출입증">
      <section id="passStage" class="pass-stage is-home">
        <img
          id="passBackground"
          class="screen-background"
          src="./home.jpg?v=11"
          alt=""
          draggable="false"
        />

        <button
          id="backHotspot"
          class="back-hotspot"
          type="button"
          aria-label="홈 화면으로 이동"
        ></button>

        <button
          id="mobilePassHotspot"
          class="mobile-pass-hotspot"
          type="button"
          aria-label="모바일 이용증 열기"
        ></button>

        <div class="name-overlay" aria-label="이름">장서현</div>
        <div id="studentIdOverlay" class="student-id-overlay" aria-label="학번"></div>

        <div class="qr-overlay">
          <img id="qrImage" alt="데모 QR 코드" draggable="false" />
        </div>

        <button
          id="refreshHotspot"
          class="refresh-hotspot"
          type="button"
          aria-label="QR 코드 새로고침"
        ></button>
      </section>
    </main>

    <script src="./app.js?v=11"></script>
  </body>
</html>
